<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .continent { fill: #2d5a3d; stroke: #4a7c59; stroke-width: 2; opacity: 0.6; }
      .ocean { fill: #0a1a2a; opacity: 0.4; }
    </style>
  </defs>
  
  <!-- Ocean -->
  <rect class="ocean" width="2000" height="1000"/>
  
  <!-- North America -->
  <path class="continent" d="M 200 300 
    L 250 280 L 300 290 L 400 300 L 500 310 L 600 320 L 700 330 L 800 340 L 900 350 
    L 1000 360 L 1100 370 L 1200 380 L 1300 390 L 1400 400 L 1500 410 L 1600 420 
    L 1700 430 L 1800 440 L 1900 450 L 2000 460 
    L 2000 550 L 1900 540 L 1800 530 L 1700 520 L 1600 510 L 1500 500 L 1400 490 
    L 1300 480 L 1200 470 L 1100 460 L 1000 450 L 900 440 L 800 430 L 700 420 
    L 600 410 L 500 400 L 400 390 L 300 380 L 250 370 L 200 360 Z"/>
  
  <!-- South America -->
  <path class="continent" d="M 700 500 
    L 800 490 L 900 500 L 1000 510 L 1100 520 L 1200 530 L 1300 540 L 1400 550 
    L 1500 560 L 1600 570 L 1700 580 L 1800 590 L 1900 600 L 2000 610 
    L 2000 750 L 1900 740 L 1800 730 L 1700 720 L 1600 710 L 1500 700 L 1400 690 
    L 1300 680 L 1200 670 L 1100 660 L 1000 650 L 900 640 L 800 630 L 700 620 Z"/>
  
  <!-- Europe -->
  <path class="continent" d="M 900 200 
    L 1000 190 L 1100 200 L 1200 210 L 1300 220 L 1400 230 L 1500 240 L 1600 250 
    L 1700 260 L 1800 270 L 1900 280 L 2000 290 
    L 2000 380 L 1900 370 L 1800 360 L 1700 350 L 1600 340 L 1500 330 L 1400 320 
    L 1300 310 L 1200 300 L 1100 290 L 1000 280 L 900 270 Z"/>
  
  <!-- Africa -->
  <path class="continent" d="M 1000 400 
    L 1100 390 L 1200 400 L 1300 410 L 1400 420 L 1500 430 L 1600 440 L 1700 450 
    L 1800 460 L 1900 470 L 2000 480 
    L 2000 750 L 1900 740 L 1800 730 L 1700 720 L 1600 710 L 1500 700 L 1400 690 
    L 1300 680 L 1200 670 L 1100 660 L 1000 650 L 950 600 L 900 550 L 850 500 
    L 900 450 Z"/>
  
  <!-- Asia -->
  <path class="continent" d="M 1200 150 
    L 1300 140 L 1400 150 L 1500 160 L 1600 170 L 1700 180 L 1800 190 L 1900 200 
    L 2000 210 
    L 2000 600 L 1900 590 L 1800 580 L 1700 570 L 1600 560 L 1500 550 L 1400 540 
    L 1300 530 L 1200 520 L 1100 510 L 1000 500 L 900 490 L 800 480 L 700 470 
    L 600 460 L 500 450 L 400 440 L 300 430 L 200 420 L 150 400 L 100 350 
    L 150 300 L 200 250 L 300 200 L 400 180 L 500 170 L 600 160 L 700 155 
    L 800 150 L 900 145 L 1000 140 L 1100 135 Z"/>
  
  <!-- India -->
  <path class="continent" d="M 1400 500 
    L 1500 490 L 1600 500 L 1700 510 L 1800 520 L 1900 530 L 2000 540 
    L 2000 600 L 1900 590 L 1800 580 L 1700 570 L 1600 560 L 1500 550 L 1400 540 Z"/>
  
  <!-- Australia -->
  <path class="continent" d="M 1600 700 
    L 1700 690 L 1800 700 L 1900 710 L 2000 720 
    L 2000 850 L 1900 840 L 1800 830 L 1700 820 L 1600 810 L 1550 780 L 1500 750 Z"/>
  
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#4a7c59" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="2000" height="1000" fill="url(#grid)"/>
</svg>
